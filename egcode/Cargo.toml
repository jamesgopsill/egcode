[package]
name = "egcode"
version = "0.1.0"
edition = "2024"

[dependencies]
x25519-dalek = {
  version = "2",
  default-features = false,
  features = ["static_secrets"]
}
chacha20poly1305 = {
  version = "0.10",
  default-features = false,
  features = ["stream"]
}
rand_core = "0.6"
pbkdf2 = {
  version = "0.12",
  default-features = false,
  features = ["hmac"]
}
hkdf = {
  version = "0.12",
  default-features = false
}
sha2 = {
  version = "0.10",
  default-features = false
}
embedded-io = { version = "0.7" }

[dev-dependencies]
rand_core = { version = "0.6", features = ["getrandom"] }
embedded-io-adapters = { version = "0.7", features = ["std"] }
